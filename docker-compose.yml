version: '3.8'

services:
  crawl4ai:
    build: .
    container_name: crawl4ai_service
    ports:
      - "8000:8000"
    environment:
      - CRAWL4AI_LOG_LEVEL=info
      - CRAWL4AI_TIMEOUT=30
      - CRAWL4AI_MAX_RETRIES=3
    volumes:
      - ./logs:/app/logs
      - ./cache:/app/cache
    restart: unless-stopped
    networks:
      - marketing_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  marketing_network:
    driver: bridge
